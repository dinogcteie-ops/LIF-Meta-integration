<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Book {{ studio_name }}</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css?v=20">
</head>
<body class="inquiry-page">
  <div class="inquiry-container">
    {% if submitted %}
    <!-- Success State -->
    <div class="inquiry-card">
      <div class="inquiry-success">
        <i class="bi bi-check-circle-fill"></i>
        <h3 style="margin:0; font-size:1.3rem">Thank You!</h3>
        <p style="color:var(--lif-muted); margin:0; font-size:.9rem">
          Your inquiry has been received. We'll get back to you within 24 hours.
        </p>
        <a href="/inquiry" class="btn btn-gold mt-3">
          <i class="bi bi-arrow-left"></i> Submit Another
        </a>
      </div>
    </div>
    {% else %}
    <!-- Inquiry Form -->
    <div class="inquiry-card">
      <h2>📸 Let's Create Together</h2>
      <p class="subtitle">Tell us about your event and we'll get back to you soon.</p>

      <form action="/inquiry" method="post">
        <div class="mb-3">
          <label class="form-label">Your Name *</label>
          <input type="text" name="client_name" class="form-control" required
                 placeholder="Full name">
        </div>

        <div class="mb-3">
          <label class="form-label">Contact (Phone / Email)</label>
          <input type="text" name="contact" class="form-control"
                 placeholder="WhatsApp number or email">
        </div>

        <div class="mb-3">
          <label class="form-label">Event Type</label>
          <select name="event_type" class="form-select">
            <option value="">Select type...</option>
            <option value="Wedding">Wedding</option>
            <option value="Pre-Wedding">Pre-Wedding</option>
            <option value="Engagement">Engagement</option>
            <option value="Birthday">Birthday</option>
            <option value="Corporate">Corporate</option>
            <option value="Maternity">Maternity</option>
            <option value="Baby Shower">Baby Shower</option>
            <option value="Portrait">Portrait</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Tentative Date</label>
          <input type="date" name="tentative_date" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Tell Us More</label>
          <textarea name="message" class="form-control" rows="3"
                    placeholder="Venue, number of guests, special requests..."></textarea>
        </div>

        <input type="hidden" name="source" value="Website Inquiry">

        <!-- Honeypot: invisible to humans; bots that auto-fill every field reveal themselves -->
        <div style="position:absolute; left:-9999px; top:-9999px" aria-hidden="true">
          <label>Website</label>
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>

        <button type="submit" class="btn btn-gold w-100 py-2" style="font-size:1rem">
          <i class="bi bi-send"></i> Send Inquiry
        </button>
      </form>
    </div>
    {% endif %}

    <div style="text-align:center; padding:20px; color:var(--lif-muted); font-size:.75rem">
      {{ studio_name }} &bull; Photography & Videography
    </div>
  </div>
</body>
</html>
