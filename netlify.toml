# Netlify is the public front door: it serves the domain, HTTPS and CDN, and
# proxies every request to the FastAPI app running on Render. Netlify itself runs
# no Python — the rewrite below forwards all traffic (incl. POST) to the backend.
#
# 1) Replace <app> with your Render service hostname.
# 2) Set BACKEND_ORIGIN / META_REFRESH_TOKEN in Netlify env (Site settings → Env).

[build]
  publish = "netlify_public"
  functions = "netlify/functions"
  command = "mkdir -p netlify_public && echo 'LIF CRM is served by Netlify proxy.' > netlify_public/index.html"

# Daily Meta metrics refresh (also keeps the free Render instance warm).
[functions."refresh-meta"]
  schedule = "0 6 * * *"

# Daily follow-up reminder digest — 09:00 IST (03:30 UTC; Netlify cron is UTC).
[functions."followup-reminders"]
  schedule = "30 3 * * *"

# Daily inbound-lead capture from the Google Sheet — 09:30 IST (04:00 UTC).
[functions."import-leads"]
  schedule = "0 4 * * *"

# Proxy everything to the Render backend. Keep this LAST.
[[redirects]]
  from = "/*"
  to = "https://lif-crm.onrender.com/:splat"
  status = 200
  force = true
